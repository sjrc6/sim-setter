name: Build executables

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: SimSetter-windows
            executable_path: dist/SimSetter.exe
          - os: ubuntu-22.04
            artifact_name: SimSetter-linux
            executable_path: dist/SimSetter

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Linux wxPython system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            freeglut3-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            libgtk-3-dev \
            libjpeg-dev \
            libnotify-dev \
            libpng-dev \
            libsm-dev \
            libsdl2-dev \
            libtiff-dev \
            python3-dev

      - name: Use wxPython Linux wheels
        if: runner.os == 'Linux'
        run: echo "PIP_FIND_LINKS=https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-22.04" >> "$GITHUB_ENV"

      - name: Build Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\build.ps1

      - name: Build Linux executable
        if: runner.os == 'Linux'
        run: bash build-linux.sh

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.executable_path }}
          if-no-files-found: error

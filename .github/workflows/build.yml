name: Build executables

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: SimSetter-windows
            executable_path: dist/SimSetter.exe
          - os: ubuntu-22.04
            artifact_name: SimSetter-linux
            executable_path: dist/SimSetter

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Linux wxPython runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            freeglut3 \
            libgtk-3-0 \
            libnotify4 \
            libsm6 \
            libsdl2-2.0-0 \
            libxtst6

      - name: Install Linux wxPython wheel
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install \
            --only-binary=:all: \
            --find-links https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-22.04 \
            wxPython==4.2.1

      - name: Build Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\build.ps1

      - name: Build Linux executable
        if: runner.os == 'Linux'
        run: bash build-linux.sh

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.executable_path }}
          if-no-files-found: error
